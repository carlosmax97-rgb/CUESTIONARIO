<style type="text/css">
	body {
	  background: #0f172a; /* fondo general */
	  color: #e5e7eb;
	  font-family: sans-serif;
	  font-size: 16px;
	}

	.faq {
	  max-width: 600px;
	  margin: 40px auto;
	  background: #111827;
	  border-radius: 12px;
	  overflow: hidden;
	  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
	}

	.faq-item {
	  border-bottom: 1px solid #1f2937;
	}

	.faq-question {
	  width: 100%;
	  padding: 18px;
	  background: none;
	  border: none;
	  color: #f9fafb;
	  text-align: left;
	  font-size: 1.5em;/*16px*/
	  cursor: pointer;

	  display: flex;
	  justify-content: space-between;
	  align-items: center;

	  transition: background 0.2s ease;
	}

	.faq-question:hover {
	  background: #1f2937;
	}

	.faq-answer {
	  max-height: 0;
	  overflow: hidden;
	  transition: max-height 0.35s ease;
	  color: #9ca3af;
	  line-height: 1.6;
	  padding: 0 18px;
	}

	.faq-item.active .faq-answer {
	  max-height: 200px;
	  padding: 0 18px 18px;
	}

	.icon {
	  font-size: 1em;/*18px*/
	  color: #60a5fa;
	  transition: transform 1.0s ease;/*0.3s*/
	}

	.faq-item.active .icon {
	  transform: rotate(45deg);
	}

	/* efecto sutil cuando está abierto */
	.faq-item.active .faq-question {
	  color: #60a5fa;
	}

	/* INPUTS */
	input {
	  width: 100%;
	  padding-left: 8px;/*8px*/
	  margin-bottom: 8px;/*8px*/
	  margin-top: 16px;
	  border-radius: 4px;/*8px*/
	  border: none;
	  background: #2a2a2a;
	  color: #888;/*#ffffff*/
	  font-size: 1.5em;/*16px*/
	}

	/* Placeholder */
	input::placeholder {
	  color: #888;/*#888*/
	  font-size: 1em;/*16px*/
	}

	/* FOCUS */
	input:focus {
	  outline: none;
	  background: #333;
	}

	h1 {
		text-align: center;
	}

	p {
		text-align: center;
		color: grey;
	}

	/*para leer en pc y moviles*/
	.container {
	  width: 100%;
	  margin: 0 auto;
	}

	@media (min-width: 1024px) {
	  .container {
	    width: 40%;
	    max-width: 700px; /* evita que sea demasiado ancho */
	  }
	}

	* {
	  box-sizing: border-box;
	}

	/*boton del audio*/
	.audio-btn-circle {
	  width: 30px;
	  height: 30px;
	  background: #2563eb; /* azul */
	  color: white;
	  border: none;
	  border-radius: 50%;
	  cursor: pointer;
	  font-size: 18px;
	  display: flex;
	  align-items: center;
	  justify-content: center;
	  transition: all 0.3s ease;
	  margin-left: 20px;
	}

	.audio-btn-circle:hover {
	  background: #1f2937;/*#1d4ed8*/
	  transform: scale(1.3);
	}

	.audio-btn-circle:active {
	  transform: scale(0.9);
	}


	.faq-header {
	  display: flex;
	  align-items: center;
	  gap: 10px;
	}

	/* opcional: que el acordeón ocupe todo el ancho 
	.faq-question {
	  flex: 1;
	  text-align: left;
	}*/
</style>

<!--Script-->
<script type="text/javascript">
	const items = document.querySelectorAll(".faq-item");

	items.forEach(item => {
	  const button = item.querySelector(".faq-question");

	  button.addEventListener("click", () => {
	    const isOpen = item.classList.contains("active");

	    // cerrar todos (modo acordeón clásico)
	    items.forEach(i => {
	      i.classList.remove("active");
	      i.querySelector(".faq-question").setAttribute("aria-expanded", "false");
	    });

	    // abrir el actual si estaba cerrado
	    if (!isOpen) {
	      item.classList.add("active");
	      button.setAttribute("aria-expanded", "true");
	    }
	  });
	});
</script>
